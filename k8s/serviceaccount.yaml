apiVersion: v1
kind: ServiceAccount
metadata:
  name: web-sa
  namespace: default
  annotations:
    # Workload Identity: maps this KSA to the GCP service account
    # that has roles/run.invoker on the user-location Cloud Run service.
    iam.gke.io/gcp-service-account: apphub-gke-sa@PROJECT_ID.iam.gserviceaccount.com
