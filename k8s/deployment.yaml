apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: default
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      serviceAccountName: web-sa
      containers:
        - name: web
          image: us-central1-docker.pkg.dev/agentic-marketing-demo/apphub/web:latest
          ports:
            - containerPort: 8080
          env:
            - name: USER_SERVICE_URL
              value: "https://user-location-iupz3py3ha-uc.a.run.app"
            - name: GOOGLE_CLOUD_PROJECT
              value: "siri-apphub"           # replaced in step 5
            # Route OTLP telemetry to the GKE managed collector (ClusterIP service).
            # The collector handles GCP auth and exports to Cloud Trace / Cloud Monitoring.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://opentelemetry-collector.gke-managed-otel.svc.cluster.local:4318"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
