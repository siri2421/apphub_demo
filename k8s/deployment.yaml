apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: default
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      serviceAccountName: web-sa
      containers:
        - name: web
          image: REGION-docker.pkg.dev/PROJECT_ID/apphub/web:latest
          ports:
            - containerPort: 8080
          env:
            - name: USER_SERVICE_URL
              value: "CLOUD_RUN_URL"        # replaced in step 5
            - name: GOOGLE_CLOUD_PROJECT
              value: "PROJECT_ID"           # replaced in step 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
